<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şehbal | Modern Eğitim Sistemi</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --primary-color: #0d4a2d; 
            --secondary-color: #0b8793; 
            --logo-blue: #29b6f6; /* Logodaki açık mavi tonu için yeni renk değişkeni */
            --bg-gradient: linear-gradient(135deg, #fdfdfd, #eef3ef); 
            --glass: rgba(255, 255, 255, 0.8);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; scroll-behavior: smooth; }
        body { background: #f0f2f0; overflow-x: hidden; }

        /* --- NAVBAR - YENİ RENK VE 3D EFEKT --- */
        .navbar { 
            /* Giriş butonunun eski rengi panelin arka planı oldu */
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color)); 
            padding: 10px 30px; 
            display: flex; justify-content: space-between; align-items: center; 
            /* Daha güçlü bir 3D görünüm için iç ve dış gölgeler */
            box-shadow: 0 15px 35px rgba(0,0,0,0.3), inset 0 3px 10px rgba(255,255,255,0.2), inset 0 -3px 10px rgba(0,0,0,0.3);
            position: sticky; top: 10px; z-index: 1000; 
            border-radius: 50px; 
            width: calc(100% - 20px); 
            margin: 0 auto; 
        }
        
        .site-logo { 
            height: 55px; 
            transition: 0.4s; 
            /* Logo koyu zeminde parlasın diye şık bir beyaz kapsayıcı verildi */
            background-color: rgba(255, 255, 255, 0.95);
            padding: 5px 15px;
            border-radius: 30px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1), 0 4px 10px rgba(0,0,0,0.2);
            margin-right: 20px; 
        }
        .site-logo:hover { transform: scale(1.05) rotate(2deg); }
        
        .nav-menu a { 
            text-decoration: none; 
            color: #ffffff; /* Koyu zeminde okunması için beyaz yapıldı */
            font-weight: 600; padding: 8px 15px; 
            border-radius: 12px; transition: all 0.4s ease;
            font-size: 14px; 
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }
        .nav-menu a:hover { 
            background: rgba(255, 255, 255, 0.15); 
            color: #ffffff; 
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1); 
        }

        /* --- YENİ AÇIK MAVİ GİRİŞ YAP BUTONU --- */
        .nav-login-btn { 
            background: var(--logo-blue); /* Logodaki açık mavi */
            color: white; border: none; padding: 10px 20px; 
            border-radius: 15px; 
            cursor: pointer; font-weight: 600; transition: 0.4s;
            /* Butona özel 3D gölge ve parlama efekti */
            box-shadow: 0 8px 15px rgba(41, 182, 246, 0.4), inset 0 2px 5px rgba(255,255,255,0.5), inset 0 -2px 5px rgba(0,0,0,0.1);
            font-size: 14px; 
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }
        .nav-login-btn:active { 
            transform: scale(0.95); 
            box-shadow: 0 4px 10px rgba(41, 182, 246, 0.4), inset 0 2px 5px rgba(0,0,0,0.1); 
        }

        /* --- MODAL --- */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 40px; border-radius: 30px; width: 400px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.2); }

        /* --- HABER SLIDER --- */
        .hero-slider {
            width: 100%;
            height: 60vh;
            overflow: hidden;
            position: relative;
            background: #000; 
        }

        .slider-inner {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.8s ease-in-out; 
        }

        .slide-card {
            min-width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        .slide-card a {
            text-decoration: none;
            display: block;
            width: 100%;
            height: 100%;
        }

        .slide-card img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            transition: transform 0.5s ease;
        }

        .slide-card:hover img {
            transform: scale(1.05); 
        }

        .slide-content {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 40px;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); 
            color: white;
            z-index: 1;
        }

        .slide-content h3 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .slide-content p {
            font-size: 1rem;
            opacity: 0.9;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .slider-prev, .slider-next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.3);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 2;
            transition: background 0.3s;
        }

        .slider-prev:hover, .slider-next:hover {
            background: rgba(255,255,255,0.5);
        }

        .slider-prev { left: 20px; }
        .slider-next { right: 20px; }

        /* --- 3D KARTLAR VE BÖLÜMLER --- */
        .section-box { padding: 80px 50px; text-align: center; background: var(--bg-gradient); }
        
        .section-box.alt-bg { background: #ffffff; }

        .card { 
            padding: 40px; background: white; border-radius: 25px; 
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 10px 10px 30px rgba(0,0,0,0.05), -10px -10px 30px rgba(255,255,255,0.8);
            transition: 0.4s;
        }
        .card:hover { transform: translateY(-15px); box-shadow: 20px 20px 60px rgba(0,0,0,0.1); }
        .card i { font-size: 40px; margin-bottom: 15px; background: -webkit-linear-gradient(var(--primary-color), var(--secondary-color)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* --- FOOTER --- */
        .footer { background: linear-gradient(135deg, #0d4a2d, #08331e); color: white; padding: 40px; text-align: center; box-shadow: 0 -10px 30px rgba(0,0,0,0.1); }
    </style>
</head>

            <p style="margin-top:20px; cursor:pointer;" onclick="document.getElementById('loginModal').style.display='none'">Kapat</p>
        </div>
    </div>
