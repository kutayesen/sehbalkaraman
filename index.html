<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şehbal | Modern Eğitim Sistemi</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --primary-color: #0d4a2d; 
            --secondary-color: #0b8793; 
            --logo-blue: #29b6f6; 
            --bg-gradient: linear-gradient(135deg, #fdfdfd, #eef3ef); 
        }
        
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Poppins', sans-serif; 
            scroll-behavior: smooth; 
        }
        
        body { 
            background: #f0f2f0; 
            overflow-x: hidden; 
        }

        /* --- NAVBAR --- */
        .navbar { 
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color)); 
            padding: 10px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            position: sticky; 
            top: 10px; 
            z-index: 1000; 
            border-radius: 50px; 
            width: 95%; 
            max-width: 1200px;
            margin: 10px auto; 
        }
        
        .logo-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
            border-radius: 30px;
            padding: 5px 15px;
            height: 55px; 
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
        }

        .logo-wrapper:hover {
            transform: scale(1.05);
        }

        .site-logo { 
            height: 100%; 
            object-fit: contain;
        }
        
        /* --- GÜNCELLENMİŞ MENÜ LİNKLERİ --- */
        .nav-menu {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .nav-menu a { 
            text-decoration: none; 
            color: #ffffff; 
            font-weight: 600; 
            padding: 8px 15px; 
            border-radius: 12px; 
            transition: all 0.3s ease;
            font-size: 14px; 
        }
        
        .nav-menu > a:hover, .dropdown > a:hover { 
            background: rgba(255, 255, 255, 0.2); 
        }

        .dropdown {
            position: relative;
            display: inline-block;
            padding: 10px 0;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #ffffff;
            min-width: 260px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
            z-index: 1001;
            border-radius: 15px;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 0;
            overflow: hidden;
        }
