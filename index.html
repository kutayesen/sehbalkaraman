<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şehbal | Modern Eğitim Sistemi</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --primary-color: #0d4a2d; 
            --secondary-color: #0b8793; 
            --bg-gradient: linear-gradient(135deg, #fdfdfd, #eef3ef); 
            --glass: rgba(255, 255, 255, 0.8);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; scroll-behavior: smooth; }
        body { background: #f0f2f0; }

        /* NAVBAR - 3D VE DERİNLİK EFEKLİ */
        .navbar { 
            background: linear-gradient(to bottom, #ffffff, #f8f9f8); 
            padding: 15px 50px; 
            display: flex; justify-content: space-between; align-items: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); /* Yumuşak düşen gölge */
            border-bottom: 2px solid rgba(13, 74, 45, 0.1);
            position: sticky; top: 0; z-index: 1000;
        }
        
        .site-logo { height: 75px; transition: 0.4s; filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.1)); }
        .site-logo:hover { transform: scale(1.05) rotate(2deg); }
        
        .nav-menu a { 
            text-decoration: none; color: #333; font-weight: 600; padding: 10px 20px; 
            border-radius: 12px; transition: all 0.4s ease;
        }
        .nav-menu a:hover { background: rgba(13, 74, 45, 0.1); color: var(--primary-color); box-shadow: inset 0 0 10px rgba(0,0,0,0.05); }

        .nav-login-btn { 
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            color: white; border: none; padding: 12px 25px; border-radius: 15px; 
            cursor: pointer; font-weight: 600; transition: 0.4s;
            box-shadow: 0 8px 15px rgba(11, 135, 147, 0.3);
        }
        .nav-login-btn:active { transform: scale(0.95); }

        /* 3D KARTLAR VE BÖLÜMLER */
        .section-box { padding: 80px 50px; text-align: center; background: var(--bg-gradient); }
        .card { 
            padding: 40px; background: white; border-radius: 25px; 
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 10px 10px 30px rgba(0,0,0,0.05), -10px -10px 30px rgba(255,255,255,0.8);
            transition: 0.4s;
        }
        .card:hover { transform: translateY(-15px); box-shadow: 20px 20px 60px rgba(0,0,0,0.1); }
        .card i { font-size: 40px; background: -webkit-linear-gradient(var(--primary-color), var(--secondary-color)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* FOOTER */
        .footer { background: linear-gradient(135deg, #0d4a2d, #08331e); color: white; padding: 40px; text-align: center; box-shadow: 0 -10px 30px rgba(0,0,0,0.1); }
        
        /* MODAL */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 40px; border-radius: 30px; width: 400px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html"><img src="326305349_728971212082418_2867891597224688947_n.png" class="site-logo"></a>
        <div class="nav-menu">
            <a href="index.html">Ana Sayfa</a>
            <a href="#birimlerimiz">Birimlerimiz</a>
            <a href="#hizmetlerimiz">Hizmetlerimiz</a>
        </div>
        <button class="nav-login-btn" onclick="document.getElementById('loginModal').style.display='flex'">Giriş Yap</button>
    </nav>

    <div class="modal" id="loginModal">
        <div class="modal-content">
            <h2 style="color:var(--primary-color);">Panel Seçimi</h2>
            <button class="nav-login-btn" style="width:100%; margin-top:20px;">Öğrenci Girişi</button>
            <button class="nav-login-btn" style="width:100%; margin-top:10px; background:var(--secondary-color);">Öğretmen Girişi</button>
            <p style="margin-top:20px; cursor:pointer;" onclick="document.getElementById('loginModal').style.display='none'">Kapat</p>
        </div>
    </div>

    <div style="width: 100%; height: 60vh; background: linear-gradient(45deg, #0d4a2d, #0b8793); display: flex; align-items: center; justify-content: center; color: white;">
        <h1>Şehbal Eğitim Sistemi</h1>
    </div>

    <section id="birimlerimiz" class="section-box">
        <h2 style="margin-bottom: 50px; font-size: 3rem;">Birimlerimiz</h2>
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px;">
            <div class="card"><i class="fa-solid fa-book-open"></i><h3>Eğitim</h3><p>Akademik destek.</p></div>
            <div class="card"><i class="fa-solid fa-dumbbell"></i><h3>Spor</h3><p>Profesyonel antrenman.</p></div>
            <div class="card"><i class="fa-solid fa-users"></i><h3>Gençlik</h3><p>Sosyal kulüpler.</p></div>
        </div>
    </section>

    <footer class="footer">
        <p>&copy; 2026 Şehbal - Modern Eğitim Platformu</p>
    </footer>

</body>
</html>
