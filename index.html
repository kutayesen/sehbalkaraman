<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şehbal | Eğitim Bilgi Sistemi</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-color: #0d4a2d; --secondary-color: #0b8793; --bg-color: #f3f4f6; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        /* ŞIK NAVBAR */
        .navbar { background: white; padding: 15px 50px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.08); position: sticky; top: 0; z-index: 1000; }
        .site-logo { height: 75px; }
        
        .nav-menu { display: flex; gap: 20px; }
        .nav-menu a { text-decoration: none; color: #4b5563; font-weight: 600; padding: 10px 15px; border-radius: 8px; transition: 0.4s; position: relative; overflow: hidden; }
        
        /* IŞIK EFEKTİ */
        .nav-menu a:hover { color: var(--secondary-color); background: rgba(11, 135, 147, 0.05); }
        .nav-menu a::before { content: ''; position: absolute; bottom: 0; left: -100%; width: 100%; height: 2px; background: var(--secondary-color); transition: 0.4s; }
        .nav-menu a:hover::before { left: 0; }

        .nav-login-btn { background: var(--primary-color); color: white; border: none; padding: 12px 25px; border-radius: 12px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .nav-login-btn:hover { background: #08331e; transform: scale(1.05); }

        /* TAM EKRAN SLIDER */
        .slider-container { width: 100%; height: 70vh; overflow: hidden; position: relative; }
        .slider { display: flex; width: 300%; height: 100%; animation: slide 30s infinite; }
        .slide { width: 100%; height: 100%; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }

        @keyframes slide {
            0% { transform: translateX(0); }
            33% { transform: translateX(-33.33%); }
            66% { transform: translateX(-66.66%); }
            100% { transform: translateX(0); }
        }

        /* GİRİŞ KARTI */
        .hero-overlay { position: absolute; top: 20%; left: 5%; z-index: 10; background: rgba(255,255,255,0.95); padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); max-width: 400px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <img src="326305349_728971212082418_2867891597224688947_n.png" class="site-logo">
        <div class="nav-menu">
            <a href="#">Ana Sayfa</a>
            <a href="#">Birimlerimiz</a>
            <a href="#">Hizmetlerimiz</a>
            <a href="#">İletişim</a>
        </div>
        <button class="nav-login-btn">Giriş Yap</button>
    </nav>

    <div class="slider-container">
        <div class="hero-overlay">
            <h2 style="color:var(--primary-color);">Şehbal'e Hoş Geldiniz</h2>
            <p style="margin-top:10px;">Eğitim, gençlik ve sporun buluşma noktası.</p>
            <button class="nav-login-btn" style="margin-top:20px; width:100%;">Panele Git</button>
        </div>

        <div class="slider">
            <div class="slide"><img src="https://picsum.photos/1920/1080?1" alt="Resim 1"></div>
            <div class="slide"><img src="https://picsum.photos/1920/1080?2" alt="Resim 2"></div>
            <div class="slide"><img src="https://picsum.photos/1920/1080?3" alt="Resim 3"></div>
        </div>
    </div>

</body>
</html>
