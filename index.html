<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şehbal | Eğitim Bilgi Sistemi</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-color: #0d4a2d; --secondary-color: #0b8793; --bg-color: #f3f4f6; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-color); color: #1f2937; }

        /* Navbar */
        .navbar { background: white; padding: 15px 50px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 100; }
        .site-logo { height: 80px; }
        .nav-menu { display: flex; gap: 25px; }
        .nav-menu a { text-decoration: none; color: #4b5563; font-weight: 500; }
        .nav-login-btn { background: var(--primary-color); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }

        /* Hero / Giriş Bölümü */
        .hero { min-height: 80vh; display: flex; justify-content: center; align-items: center; padding: 40px; }
        .login-wrapper { background: white; padding: 40px; border-radius: 20px; width: 100%; max-width: 500px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }

        /* Haberler Kısmı */
        .news-section { padding: 60px 20px; text-align: center; }
        .news-container { display: flex; gap: 20px; overflow-x: auto; padding: 20px; }
        .news-card { min-width: 300px; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); cursor: pointer; transition: 0.3s; }
        .news-card:hover { transform: translateY(-10px); }
        .news-card img { width: 100%; height: 180px; object-fit: cover; border-radius: 10px; }

        /* Modal */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 500px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <img src="326305349_728971212082418_2867891597224688947_n.png" class="site-logo">
        <div class="nav-menu">
            <a href="#">Ana Sayfa</a>
            <a href="#haberler">Haberler</a>
            <a href="#">Hakkımızda</a>
            <a href="#">Dükkan</a>
        </div>
        <button class="nav-login-btn">Giriş Yap</button>
    </nav>

    <div class="hero">
        <div class="login-wrapper">
            <h3>Şehbal'e Hoş Geldiniz</h3>
            <p>Eğitim ve sporun birleştiği nokta.</p>
        </div>
    </div>

    <div class="news-section" id="haberler">
        <h2>Güncel Haberler</h2>
        <div class="news-container">
            <div class="news-card" onclick="openModal('Şehbal Turnuvası', 'Detaylar burada yazacak...')">
                <img src="https://picsum.photos/300/200" alt="Haber">
                <h3>Kulüp Turnuvası</h3>
            </div>
            <div class="news-card" onclick="openModal('Yeni Sezon', 'Kayıtlar başladı!')">
                <img src="https://picsum.photos/301/200" alt="Haber">
                <h3>Yeni Sezon Kayıtları</h3>
            </div>
        </div>
    </div>

    <div class="modal" id="newsModal">
        <div class="modal-content">
            <h2 id="modalTitle"></h2>
            <p id="modalBody"></p>
            <br>
            <button onclick="document.getElementById('newsModal').style.display='none'">Kapat</button>
        </div>
    </div>

    <script>
        function openModal(t, b) {
            document.getElementById('modalTitle').innerText = t;
            document.getElementById('modalBody').innerText = b;
            document.getElementById('newsModal').style.display = 'flex';
        }
    </script>
</body>
</html>
