<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şehbal | Modern Eğitim Sistemi</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --primary-color: #0d4a2d; 
            --secondary-color: #0b8793; 
            --logo-blue: #29b6f6; 
            --bg-gradient: linear-gradient(135deg, #fdfdfd, #eef3ef); 
            --glass: rgba(255, 255, 255, 0.8);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; scroll-behavior: smooth; }
        body { background: #f0f2f0; overflow-x: hidden; }

        /* --- NAVBAR --- */
        .navbar { 
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color)); 
            padding: 10px 30px; 
            display: flex; justify-content: space-between; align-items: center; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.3), inset 0 3px 10px rgba(255,255,255,0.2), inset 0 -3px 10px rgba(0,0,0,0.3);
            position: sticky; top: 10px; z-index: 1000; 
            border-radius: 50px; 
            width: calc(100% - 20px); 
            margin: 0 auto; 
        }
        
        /* --- LOGO KAPSAYICISI (ŞIK BEYAZ HAP TASARIMI) --- */
        .logo-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ffffff; /* Temiz bir beyaz arka plan */
            border-radius: 30px; /* Tam kavisli kenarlar */
            padding: 5px 15px; /* Logonun etrafında nefes alacak boşluk */
            margin-right: 20px;
            transition: 0.4s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2); /* Panelin üstünde havada dursun diye hafif gölge */
            text-decoration: none;
        }
        .logo-wrapper:hover {
            transform: scale(1.05) translateY(-2px); /* Üzerine gelince tatlı bir kalkış efekti */
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .site-logo { 
            height: 50px; /* Kapsayıcının içinde zarif dursun diye bir tık küçültüldü */
            /* Logonun kendi renkleri parlasın diye mix-blend-mode kaldırıldı */
        }
        
        .nav-menu a { 
            text-decoration: none; 
            color: #ffffff; 
            font-weight: 600; padding: 8px 15px; 
            border-radius: 12px; transition: all 0.4s ease;
            font-size: 14px; 
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }
        .nav-menu a:hover { 
            background: rgba(255, 255, 255, 0.15); 
            color: #ffffff; 
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1); 
        }

        /* --- GİRİŞ YAP BUTONU --- */
        .nav-login-btn { 
            background: var(--logo-blue); 
            color: white; border: none; padding: 10px 20px; 
            border-radius: 15px; 
            cursor: pointer; font-weight: 600; transition: 0.4s;
            box-shadow: 0 8px 15px rgba(41, 182, 246, 0.4), inset 0 2px 5px rgba(255,255,255,0.5), inset 0 -2px 5px rgba(0,0,0,0.1);
            font-size: 14px; 
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }
        .nav-login-btn:active { 
            transform: scale(0.95); 
            box-shadow: 0 4px 10px rgba(41, 182, 246, 0.4), inset 0 2px 5px rgba(0,0,0,0.1); 
        }

        /* --- MODAL --- */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 40px; border-radius: 30px; width: 400px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.2); }

        /* --- HABER SLIDER --- */
        .hero-slider {
            width: 100%;
            height: 60vh;
            overflow: hidden;
            position: relative;
            background: #000; 
        }

        .slider-inner {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.8s ease-in-out; 
        }

        .slide-card {
            min-width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        .slide-card a {
            text-decoration: none;
            display: block;
            width: 100%;
            height: 100%;
        }

        .slide-card img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            transition: transform 0.5s ease;
        }

        .slide-card:hover img {
            transform: scale(1.05); 
        }

        .slide-content {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 40px;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); 
            color: white;
            z-index: 1;
        }

        .slide-content h3 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .slide-content p {
            font-size: 1rem;
            opacity: 0.9;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .slider-prev, .slider-next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.3);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 2;
            transition: background 0.3s;
        }

        .slider-prev:hover, .slider-next:hover {
            background: rgba(255,255,255,0.5);
        }

        .slider-prev { left: 20px; }
        .slider-next { right: 20px; }

        /* --- 3D KARTLAR VE BÖLÜMLER --- */
        .section-box { padding: 80px 50px; text-align: center; background: var(--bg-gradient); }
        
        .section-box.alt-bg { background: #ffffff; }

        .card { 
            padding: 40px; background: white; border-radius: 25px; 
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 10px 10px 30px rgba(0,0,0,0.05), -10px -10px 30px rgba(255,255,255,0.8);
            transition: 0.4s;
        }
        .card:hover { transform: translateY(-15px); box-shadow: 20px 20px 60px rgba(0,0,0,0.1); }
        .card i { font-size: 40px; margin-bottom: 15px; background: -webkit-linear-gradient(var(--primary-color), var(--secondary-color)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* --- FOOTER --- */
        .footer { background: linear-gradient(135deg, #0d4a2d, #08331e); color: white; padding: 40px; text-align: center; box-shadow: 0 -10px 30px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html"
